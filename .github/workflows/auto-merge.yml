name: Auto Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable Auto Merge
    runs-on: ubuntu-24.04
    steps:
      - run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
