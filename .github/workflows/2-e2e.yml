name: E2E

on:
  workflow_run:
    workflows: ["Commit Validation"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci --ignore-scripts
      - run: npx prisma generate --config packages/db/prisma.config.ts
      - run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL not set — E2E skipped (configure VERCEL_PREVIEW_URL secret)"
            exit 0
          fi
          npx nx run web-e2e:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-e2e/playwright-report/
          retention-days: 7
