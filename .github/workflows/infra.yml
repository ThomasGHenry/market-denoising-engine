name: Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/infra.yml']
  pull_request:
    paths: ['infra/**', '.github/workflows/infra.yml']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with: { tofu_version: '1.9.0' }

      - name: Plan infra/github
        id: plan-github
        run: |
          tofu init
          tofu plan -no-color 2>&1 | tee plan_output.txt
          { echo "stdout<<EOF"; cat plan_output.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"
        working-directory: infra/github
        env:
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_auth_github_id: ${{ secrets.TF_VAR_AUTH_GITHUB_ID }}
          TF_VAR_auth_github_secret: ${{ secrets.TF_VAR_AUTH_GITHUB_SECRET }}
          TF_VAR_auth_secret: ${{ secrets.TF_VAR_AUTH_SECRET }}
          TF_VAR_auth_resend_key: ${{ secrets.TF_VAR_AUTH_RESEND_KEY }}
          TF_VAR_neon_api_key: ${{ secrets.TF_VAR_NEON_API_KEY }}
          TF_VAR_vercel_token: ${{ secrets.TF_VAR_VERCEL_TOKEN }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
          TF_VAR_dreamhost_api_key: ${{ secrets.TF_VAR_DREAMHOST_API_KEY }}

      - name: Plan infra/app
        id: plan-app
        run: |
          tofu init
          tofu plan -no-color 2>&1 | tee plan_output.txt
          { echo "stdout<<EOF"; cat plan_output.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"
        working-directory: infra/app
        env:
          TF_VAR_vercel_token: ${{ secrets.TF_VAR_vercel_token }}
          TF_VAR_neon_api_key: ${{ secrets.TF_VAR_neon_api_key }}
          TF_VAR_auth_secret: ${{ secrets.TF_VAR_auth_secret }}
          TF_VAR_auth_github_id: ${{ secrets.TF_VAR_auth_github_id }}
          TF_VAR_auth_github_secret: ${{ secrets.TF_VAR_auth_github_secret }}
          TF_VAR_auth_resend_key: ${{ secrets.TF_VAR_AUTH_RESEND_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}

      - name: Post plan comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          PLAN_GITHUB: ${{ steps.plan-github.outputs.stdout }}
          PLAN_APP: ${{ steps.plan-app.outputs.stdout }}
        run: |
          {
            echo "## Tofu Plan — infra/github"
            echo '```'
            echo "$PLAN_GITHUB"
            echo '```'
            echo "## Tofu Plan — infra/app"
            echo '```'
            echo "$PLAN_APP"
            echo '```'
          } > /tmp/plan-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/plan-comment.md

  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with: { tofu_version: '1.9.0' }

      - name: Apply infra/github
        run: tofu init && tofu apply -auto-approve
        working-directory: infra/github
        env:
          TF_VAR_github_token: ${{ secrets.TF_VAR_github_token }}
          TF_VAR_auth_github_id: ${{ secrets.TF_VAR_AUTH_GITHUB_ID }}
          TF_VAR_auth_github_secret: ${{ secrets.TF_VAR_AUTH_GITHUB_SECRET }}
          TF_VAR_auth_secret: ${{ secrets.TF_VAR_AUTH_SECRET }}
          TF_VAR_auth_resend_key: ${{ secrets.TF_VAR_AUTH_RESEND_KEY }}
          TF_VAR_neon_api_key: ${{ secrets.TF_VAR_NEON_API_KEY }}
          TF_VAR_vercel_token: ${{ secrets.TF_VAR_VERCEL_TOKEN }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
          TF_VAR_dreamhost_api_key: ${{ secrets.TF_VAR_DREAMHOST_API_KEY }}

      - name: Sync infra/app state
        run: |
          tofu init
          tofu state rm vercel_project_environment_variables.mde 2>/dev/null || true
          tofu import vercel_project_environment_variables.mde prj_zY3GKAFzEtiU4z36Vn4YnarqRffM
        working-directory: infra/app
        env:
          TF_VAR_vercel_token: ${{ secrets.TF_VAR_vercel_token }}
          TF_VAR_neon_api_key: ${{ secrets.TF_VAR_neon_api_key }}
          TF_VAR_auth_secret: ${{ secrets.TF_VAR_auth_secret }}
          TF_VAR_auth_github_id: ${{ secrets.TF_VAR_auth_github_id }}
          TF_VAR_auth_github_secret: ${{ secrets.TF_VAR_auth_github_secret }}
          TF_VAR_auth_resend_key: ${{ secrets.TF_VAR_AUTH_RESEND_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}

      - name: Apply infra/app
        run: tofu apply -auto-approve
        working-directory: infra/app
        env:
          TF_VAR_vercel_token: ${{ secrets.TF_VAR_vercel_token }}
          TF_VAR_neon_api_key: ${{ secrets.TF_VAR_neon_api_key }}
          TF_VAR_auth_secret: ${{ secrets.TF_VAR_auth_secret }}
          TF_VAR_auth_github_id: ${{ secrets.TF_VAR_auth_github_id }}
          TF_VAR_auth_github_secret: ${{ secrets.TF_VAR_auth_github_secret }}
          TF_VAR_auth_resend_key: ${{ secrets.TF_VAR_AUTH_RESEND_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
