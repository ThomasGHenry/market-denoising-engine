name: Renovate

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check for RENOVATE_TOKEN
        run: bash scripts/ci/check-renovate-token.sh
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
      - uses: actions/checkout@v4
        if: env.RENOVATE_TOKEN_PRESENT == 'true'
      - uses: renovatebot/github-action@v46
        if: env.RENOVATE_TOKEN_PRESENT == 'true'
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
