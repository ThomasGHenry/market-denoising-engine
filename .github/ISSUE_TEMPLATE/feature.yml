name: Feature
description: New capability or enhancement
title: "[Feature]: "
labels:
  - enhancement
  - needs-spec
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this do for the user? Focus on outcomes, not implementation.
    validations:
      required: true

  - type: textarea
    id: learning_spine_check
    attributes:
      label: Learning spine check
      description: How does this make the loop (probe → publish → measure → review → mutate) more visible, measurable, or repeatable? Skip if not applicable.
    validations:
      required: false

  - type: textarea
    id: acceptance_scenarios
    attributes:
      label: Acceptance Scenarios
      description: BDD-style acceptance criteria (optional — add when known)
      placeholder: |
        Given [precondition]
        When [action]
        Then [outcome]
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Anything explicitly excluded, including PRD §7 out-of-scope items.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — Blocking"
        - "P1 — High"
        - "P2 — Medium"
        - "P3 — Nice-to-have"
    validations:
      required: true

  - type: checkboxes
    id: impact_area
    attributes:
      label: Impact Area
      options:
        - label: Generation
        - label: Probe
        - label: Platform post / metric snapshot
        - label: Scoring / fitness function
        - label: Signal review
        - label: Mutation
        - label: Dashboard
        - label: Domain / scoring package
        - label: Database / schema
        - label: CI / governance
